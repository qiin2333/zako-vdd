name: Help Request
description: 请求帮助
title: "[Help]: "
labels: ["help wanted", "triage"]
assignees: ["zjoasan", "bud3699", "itsmikethetech"]

body:
  - type: markdown
    attributes:
      value: |
        感谢您联系我们！请尽可能详细地提供信息，这将帮助我们更好地协助您。
  
  - type: dropdown
    id: OS
    attributes:
      label: 操作系统版本
      description: 您使用的 Windows 版本是什么？
      options:
        - Windows 11 Pro
        - Windows 11 Home
        - Windows 10 Pro
        - Windows 10 Home
        - Windows Server
        - 其他
      default: 0
    validations:
      required: true
  
  - type: dropdown
    id: Version
    attributes:
      label: Windows 版本号
      description: 您使用的 Windows 具体版本号是什么？
      options:
        - 24H2
        - 23H2
        - 22H2
        - 21H2
        - 1809
        - 1607
        - 1507
        - 其他
      default: 2
    validations:
      required: true
  
  - type: markdown
    attributes:
      value: |
        如果不知道如何查找 Windows 版本，请前往：设置 -> 系统 -> 关于。
  
  - type: input
    id: driver-version
    attributes:
      label: 驱动版本
      description: 您使用的驱动版本是什么？
      placeholder: 例如：1.0.0.0
    validations:
      required: true
  
  - type: dropdown
    id: sunshine-version
    attributes:
      label: Foundation Sunshine 版本（如适用）
      description: 如果您在使用 Foundation Sunshine，请选择版本
      options:
        - 未使用 Foundation Sunshine
        - 最新版本
        - 其他版本（请在描述中说明）
      default: 0
    validations:
      required: false
  
  - type: textarea
    id: device-specs
    attributes:
      label: 硬件配置（可选）
      description: 提供硬件配置信息有助于我们判断是否为硬件兼容性问题。这不是必需的，但会很有帮助。
      placeholder: |
        CPU: 例如 Intel Core i7-12700K
        GPU: 例如 NVIDIA RTX 3080
        RAM: 例如 32GB DDR4
        主板: 例如 ASUS ROG STRIX Z690
    validations:
      required: false
  
  - type: textarea
    id: issue-info
    attributes:
      label: 您遇到的问题或需要什么帮助？
      description: 请详细描述您遇到的问题或需要帮助的内容
      placeholder: |
        请清楚地描述您遇到的问题或需要帮助的内容。
    validations:
      required: true 
  
  - type: textarea
    id: troubleshooting-steps
    attributes:
      label: 已尝试的故障排除步骤
      description: 您已经尝试了哪些方法来解决问题？
      placeholder: |
        列出您已经尝试过的步骤，例如：
        - 检查了设备管理器
        - 重新安装了驱动
        - 查看了日志文件
    validations:
      required: false 
  
  - type: textarea
    id: expected-outcome
    attributes:
      label: 预期结果
      description: 您期望或希望发生什么？
      placeholder: |
        描述您期望的行为或结果。
    validations:
      required: false 
  
  - type: textarea
    id: additional-info
    attributes:
      label: 其他信息
      description: 任何可能帮助我们协助您的额外信息
      placeholder: |
        提供相关的日志、截图或错误消息。
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: 联系方式
      description: 如果需要更多信息，我们如何联系您？
      placeholder: 例如：email@example.com 或 GitHub 用户名
    validations:
      required: false
