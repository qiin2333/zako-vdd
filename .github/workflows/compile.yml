name: Virtual Display Driver Building
on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64, ARM64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        shell: pwsh
        run: |
          choco install windowsdriverkit11 -y
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # Install WDK VSIX for MSBuild integration
          $vsixFiles = Get-ChildItem "C:\Program Files*\Windows Kits\10\Vsix\*\WDK.vsix" -Recurse -ErrorAction SilentlyContinue
          if ($vsixFiles) {
            $vsixInstaller = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\VSIXInstaller.exe"
            if (Test-Path $vsixInstaller) {
              foreach ($vsix in $vsixFiles) {
                Write-Host "Installing VSIX: $($vsix.FullName)"
                $p = Start-Process -FilePath $vsixInstaller -ArgumentList "/q", $vsix.FullName -Wait -NoNewWindow -PassThru
                Write-Host "VSIX installer exit code: $($p.ExitCode)"
              }
            }
          }

      - name: Build the driver
        run: |
          msbuild "Virtual Display Driver (HDR)/ZakoVDD.sln" /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: List build directory
        run: dir "Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD"

      - name: Upload built driver
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: Built-Driver-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\ZakoVDD.dll
            Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\ZakoVDD.inf
            Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\zakovdd.cat
            Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\vdd_settings.xml

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x64 Release artifact
        uses: actions/download-artifact@v4
        with:
          name: Built-Driver-Release-x64
          path: driver-x64/

      - name: Package release zip
        run: |
          cd driver-x64
          zip -j ../zakovdd.zip ZakoVDD.dll ZakoVDD.inf zakovdd.cat
          cd ..
          ls -la zakovdd.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zakovdd.zip
          generate_release_notes: true

      - name: Notify Sunshine to update VDD version
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SUNSHINE_DISPATCH_TOKEN }}
          repository: qiin2333/foundation-sunshine
          event-type: driver-release
          client-payload: '{"component": "vdd", "version": "${{ github.ref_name }}"}'
