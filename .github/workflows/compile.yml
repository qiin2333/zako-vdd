name: Virtual Display Driver Building
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - sunshine
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
      - sunshine
jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'

      - name: Install WDK
        shell: pwsh
        run: |
          # Check if WDK and its VS2022 MSBuild tasks are installed.
          $requiredVsVersion = "17.0"
          $wdkTaskPattern = "C:\Program Files*\Windows Kits\10\build\*\bin\Microsoft.DriverKit.Build.Tasks.$requiredVsVersion.dll"
          $wdfHeader = Get-ChildItem "C:\Program Files*\Windows Kits\10\Include\*\wdf" -Directory -ErrorAction SilentlyContinue |
                       Sort-Object { $_.Parent.Name } -Descending |
                       Select-Object -First 1
          $wdkTask = Get-ChildItem $wdkTaskPattern -ErrorAction SilentlyContinue |
                     Sort-Object { $_.Directory.Parent.Name } -Descending |
                     Select-Object -First 1

          if ($wdfHeader -and $wdkTask) {
            Write-Host "WDK already installed at: $($wdfHeader.FullName)"
            Write-Host "WDK MSBuild task found at: $($wdkTask.FullName)"
          } else {
            Write-Host "Installing WDK..."
            $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2272234"
            $wdkInstaller = "$env:TEMP\wdksetup.exe"
            Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller -UseBasicParsing
            $proc = Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet", "/norestart", "/features", "+" -Wait -NoNewWindow -PassThru
            Write-Host "WDK installer exit code: $($proc.ExitCode)"
            if ($proc.ExitCode -ne 0) {
              Write-Error "WDK installer failed with exit code $($proc.ExitCode)"
              exit 1
            }
          }

          # Install WDK VSIX for MSBuild integration into the selected VS2022 instance.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Error "vswhere.exe not found"
            exit 1
          }

          $vsInstall = & $vswhere -products * -requires Microsoft.Component.MSBuild -version "[17.0,18.0)" -property installationPath -latest
          if (-not $vsInstall) {
            Write-Error "Visual Studio 2022 with MSBuild was not found"
            exit 1
          }
          Write-Host "Using Visual Studio: $vsInstall"

          $vsixInstaller = Join-Path $vsInstall "Common7\IDE\VSIXInstaller.exe"
          if (-not (Test-Path $vsixInstaller)) {
            Write-Error "VSIXInstaller.exe not found at $vsixInstaller"
            exit 1
          }

          $vsixFiles = Get-ChildItem "C:\Program Files*\Windows Kits\10\Vsix\*\WDK.vsix" -Recurse -ErrorAction SilentlyContinue
          if (-not $vsixFiles) {
            Write-Error "WDK.vsix not found"
            exit 1
          }

          foreach ($vsix in $vsixFiles) {
            Write-Host "Installing VSIX: $($vsix.FullName)"
            $p = Start-Process -FilePath $vsixInstaller -ArgumentList "/q", $vsix.FullName -Wait -NoNewWindow -PassThru
            Write-Host "VSIX installer exit code: $($p.ExitCode)"
          }

          $wdkTask = Get-ChildItem $wdkTaskPattern -ErrorAction SilentlyContinue |
                     Sort-Object { $_.Directory.Parent.Name } -Descending |
                     Select-Object -First 1
          if (-not $wdkTask) {
            Write-Error "WDK MSBuild task for VS $requiredVsVersion not found ($wdkTaskPattern)"
            exit 1
          }
          Write-Host "Verified WDK MSBuild task: $($wdkTask.FullName)"

      - name: Build the driver
        run: |
          msbuild "ZakoVDD.sln" /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Build Vulkan HDR diagnostics
        shell: cmd
        run: |
          call tools\vulkan_hdr_policy_test\build_consumer.bat || exit /b 1
          call tools\vulkan_hdr_probe\build_consumer.bat || exit /b 1
          call tools\vulkan_hdr_bridge\build_consumer.bat || exit /b 1
          call tools\vdd_command\build_consumer.bat || exit /b 1
          call tools\desktop_hdr_capture\build_consumer.bat || exit /b 1
          call tools\vdd_capture_test\build_consumer.bat || exit /b 1

      - name: Stamp driver version
        shell: pwsh
        run: |
          # Resolve stampinf path from WDK
          $stampinf = Get-ChildItem "C:\Program Files*\Windows Kits\10\bin\*\x64\stampinf.exe" -ErrorAction SilentlyContinue |
                      Sort-Object { $_.Directory.Parent.Name } -Descending |
                      Select-Object -First 1
          if (-not $stampinf) {
            Write-Error "stampinf.exe not found"
            exit 1
          }
          Write-Host "Using stampinf: $($stampinf.FullName)"

          $infPath = "${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\ZakoVDD.inf"

          # Extract numeric version from tag (e.g. v0.13 -> 100.0.13.0,
          # v0.15.3-zak2333 -> 100.0.15.3) or use date-based version.
          # DriverVer must be numeric dotted-quad. Keep release labels in the
          # Git tag name only; suffixes such as "-zak2333" make Windows unable
          # to parse/display the installed driver version correctly.
          $ref = "${{ github.ref }}"
          if ($ref -match '^refs/tags/v(.+)$') {
            $tagVersion = $Matches[1]
            $numericMatch = [regex]::Match($tagVersion, '^\d+(?:\.\d+){0,3}')
            if (-not $numericMatch.Success) {
              Write-Error "Tag '$tagVersion' does not start with a numeric version"
              exit 1
            }
            $ver = $numericMatch.Value
            # Prefix with 100 to ensure CI builds always outrank local builds
            # v0.13 -> 100.0.13.0, v1.2.3 -> 100.1.2.3
            $parts = $ver.Split('.')
            $parts = @('100') + $parts
            while ($parts.Count -lt 4) { $parts += '0' }
            $version = ($parts[0..3] -join '.')
          } else {
            # Non-tag build: use 99.MM.DD.HHMM to ensure high version
            $now = Get-Date -Format "MM.dd.HHmm"
            $version = "99.$now"
          }

          $date = Get-Date -Format "MM/dd/yyyy"
          Write-Host "Setting DriverVer = $date, $version"

          & $stampinf.FullName -f $infPath -d $date -v $version
          Get-Content $infPath | Select-String "DriverVer"

      - name: List build directory
        continue-on-error: true
        run: dir "${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD"

      - name: Sign driver with certificate
        # PR builds do not receive signing secrets. Tag/main builds sign when the
        # repository has a certificate configured.
        shell: pwsh
        env:
          SIGNING_CERT_PFX: ${{ secrets.SIGNING_CERT_PFX }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if (-not $env:SIGNING_CERT_PFX) {
            Write-Host "::warning::No signing certificate configured, skipping signing"
            exit 0
          }

          # Import PFX certificate and get its thumbprint
          $pfxBytes = [Convert]::FromBase64String($env:SIGNING_CERT_PFX)
          $pfxPath = Join-Path $env:TEMP "signcert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          $securePass = ConvertTo-SecureString $env:SIGNING_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePass
          $thumbprint = $cert.Thumbprint
          Write-Host "Imported certificate thumbprint: $thumbprint"
          Remove-Item $pfxPath -Force

          # Locate signtool from WDK
          $signtool = Get-ChildItem "C:\Program Files*\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
                      Sort-Object { $_.Directory.Parent.Name } -Descending |
                      Select-Object -First 1
          if (-not $signtool) {
            Write-Error "signtool.exe not found"
            exit 1
          }
          Write-Host "Using signtool: $($signtool.FullName)"

          $buildDir = "${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD"
          
          # Search for inf2cat in both x64 and x86 (MSBuild uses x86)
          $inf2cat = Get-ChildItem "C:\Program Files*\Windows Kits\10\bin\*\x64\inf2cat.exe","C:\Program Files*\Windows Kits\10\bin\*\x86\inf2cat.exe" -ErrorAction SilentlyContinue |
                     Sort-Object { $_.Directory.Parent.Name } -Descending |
                     Select-Object -First 1

          # Recreate catalog file after stampinf modified the INF
          if ($inf2cat) {
            Write-Host "Recreating catalog with inf2cat: $($inf2cat.FullName)"
            & $inf2cat.FullName /driver:"$buildDir" /os:10_X64 /verbose
            if ($LASTEXITCODE -ne 0) {
              Write-Error "inf2cat failed with exit code $LASTEXITCODE"
              exit 1
            }
            Write-Host "Catalog regenerated successfully"
          } else {
            Write-Error "inf2cat.exe not found"
            exit 1
          }

          # Sign the catalog file with our specific certificate
          $catFile = Join-Path $buildDir "zakovdd.cat"
          if (Test-Path $catFile) {
            Write-Host "Signing catalog file..."
            & $signtool.FullName sign /sha1 $thumbprint /fd SHA256 /v $catFile
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to sign catalog file"
              exit 1
            }
            Write-Host "Catalog signed successfully"
          }

          # Export the signing certificate as .cer (overrides the self-signed test cert from MSBuild)
          $cerPath = Join-Path (Split-Path $buildDir -Parent) "ZakoVDD.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath -Type CERT | Out-Null
          Write-Host "Exported signing certificate to $cerPath"

      - name: Upload built driver
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: Built-Driver-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            ${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\ZakoVDD.dll
            ${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\ZakoVDD.inf
            ${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\zakovdd.cat
            ${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\vdd_settings.xml
            ${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD.cer
            tools\vulkan_hdr_bridge\build\zako_vulkan_hdr_bridge.dll
            tools\vulkan_hdr_bridge\build\VkLayer_zako_virtual_hdr.json
            tools\vulkan_hdr_probe\build\vulkan_hdr_probe.exe

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x64 Release artifact
        uses: actions/download-artifact@v4
        with:
          name: Built-Driver-Release-x64
          path: driver-x64/

      - name: Package release zip
        run: |
          cd driver-x64
          zip -j ../zakovdd.zip \
            x64/Release/ZakoVDD/ZakoVDD.dll \
            x64/Release/ZakoVDD/ZakoVDD.inf \
            x64/Release/ZakoVDD/zakovdd.cat \
            x64/Release/ZakoVDD/vdd_settings.xml \
            x64/Release/ZakoVDD.cer \
            tools/vulkan_hdr_bridge/build/zako_vulkan_hdr_bridge.dll \
            tools/vulkan_hdr_bridge/build/VkLayer_zako_virtual_hdr.json \
            tools/vulkan_hdr_probe/build/vulkan_hdr_probe.exe
          cd ..
          unzip -l zakovdd.zip
          for required in ZakoVDD.dll ZakoVDD.inf zakovdd.cat vdd_settings.xml ZakoVDD.cer \
                          zako_vulkan_hdr_bridge.dll VkLayer_zako_virtual_hdr.json vulkan_hdr_probe.exe; do
            unzip -l zakovdd.zip "$required" >/dev/null
          done
          ls -la zakovdd.zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: zakovdd.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}

      - name: Notify Sunshine to update VDD version
        if: ${{ !contains(github.ref_name, '-') }}
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SUNSHINE_DISPATCH_TOKEN }}
          repository: qiin2333/foundation-sunshine
          event-type: driver-release
          client-payload: '{"component": "vdd", "version": "${{ github.ref_name }}"}'
