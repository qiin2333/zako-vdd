name: Bug Report
description: 报告虚拟显示器驱动的 Bug
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: ["zjoasan", "bud3699", "itsmikethetech"]

body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间填写此 Bug 报告！请尽可能详细地描述问题，这将帮助我们更快地定位和修复问题。
  
  - type: dropdown
    id: OS
    attributes:
      label: 操作系统版本
      description: 您使用的 Windows 版本是什么？
      options:
        - Windows 11 Pro
        - Windows 11 Home
        - Windows 10 Pro
        - Windows 10 Home
        - Windows Server
        - 其他
      default: 0
    validations:
      required: true
  
  - type: dropdown
    id: Version
    attributes:
      label: Windows 版本号
      description: 您使用的 Windows 具体版本号是什么？
      options:
        - 24H2
        - 23H2
        - 22H2
        - 21H2
        - 1809
        - 1607
        - 1507
        - 其他
      default: 2
    validations:
      required: true
  
  - type: markdown
    attributes:
      value: |
        如果不知道如何查找 Windows 版本，请前往：设置 -> 系统 -> 关于，在 Windows 规格下查看。
  
  - type: input
    id: driver-version
    attributes:
      label: 驱动版本
      description: 您使用的驱动版本是什么？（可在设备管理器中查看）
      placeholder: 例如：1.0.0.0
    validations:
      required: true
  
  - type: dropdown
    id: sunshine-version
    attributes:
      label: Foundation Sunshine 版本（如适用）
      description: 如果您在使用 Foundation Sunshine，请选择版本
      options:
        - 未使用 Foundation Sunshine
        - 最新版本
        - 其他版本（请在描述中说明）
      default: 0
    validations:
      required: false
  
  - type: textarea
    id: device-specs
    attributes:
      label: 硬件配置
      description: 请提供您的硬件配置信息，这将帮助我们判断是否为硬件兼容性问题。
      placeholder: |
        CPU: 例如 Intel Core i7-12700K
        GPU: 例如 NVIDIA RTX 3080
        RAM: 例如 32GB DDR4
        主板: 例如 ASUS ROG STRIX Z690
    validations:
      required: false
  
  - type: textarea
    id: bug-info
    attributes:
      label: Bug 描述
      description: 请详细描述您遇到的问题
      placeholder: |
        请清楚地描述您看到的问题。
        例如：虚拟显示器无法正常显示、HDR 功能不工作、驱动安装失败等。
    validations:
      required: true 
  
  - type: textarea
    id: reproduce-info
    attributes:
      label: 复现步骤
      description: 请描述如何复现这个问题
      placeholder: |
        1. 打开设备管理器
        2. 执行某个操作
        3. 观察到问题
    validations:
      required: false 
  
  - type: textarea
    id: expected-info
    attributes:
      label: 预期行为
      description: 请描述您期望的正常行为
      placeholder: |
        描述正常情况下应该发生什么。
        例如：虚拟显示器应该正常显示，分辨率应该可以调整等。
    validations:
      required: false 
  
  - type: textarea
    id: log-file
    attributes:
      label: 日志文件
      description: 请上传日志文件以帮助我们诊断问题。您可以在 vdd_settings.xml 中启用日志功能，然后重启驱动。日志文件通常位于 C:\VirtualDisplayDriver\ 目录下。
      placeholder: 拖放日志文件到这里或点击上传
    validations:
      required: false

  - type: textarea
    id: config-file
    attributes:
      label: 配置文件内容（可选）
      description: 如果可能，请提供您的 vdd_settings.xml 配置文件内容（请移除敏感信息）
      placeholder: |
        粘贴您的 vdd_settings.xml 配置内容
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: 联系方式
      description: 如果需要更多信息，我们如何联系您？
      placeholder: 例如：email@example.com 或 GitHub 用户名
    validations:
      required: false
