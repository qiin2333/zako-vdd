name: Virtual Display Driver Building
on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        shell: pwsh
        run: |
          # Check if WDK is already installed
          $wdfHeader = Get-ChildItem "C:\Program Files*\Windows Kits\10\Include\*\wdf" -Directory -ErrorAction SilentlyContinue |
                       Sort-Object { $_.Parent.Name } -Descending |
                       Select-Object -First 1
          if ($wdfHeader) {
            Write-Host "WDK already installed at: $($wdfHeader.FullName)"
          } else {
            Write-Host "Installing WDK..."
            $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2272234"
            $wdkInstaller = "$env:TEMP\wdksetup.exe"
            Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller -UseBasicParsing
            $proc = Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet", "/norestart", "/features", "+" -Wait -NoNewWindow -PassThru
            Write-Host "WDK installer exit code: $($proc.ExitCode)"
          }

          # Install WDK VSIX for MSBuild integration
          $vsixFiles = Get-ChildItem "C:\Program Files*\Windows Kits\10\Vsix\*\WDK.vsix" -Recurse -ErrorAction SilentlyContinue
          if ($vsixFiles) {
            $vsixInstaller = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\VSIXInstaller.exe"
            if (Test-Path $vsixInstaller) {
              foreach ($vsix in $vsixFiles) {
                Write-Host "Installing VSIX: $($vsix.FullName)"
                $p = Start-Process -FilePath $vsixInstaller -ArgumentList "/q", $vsix.FullName -Wait -NoNewWindow -PassThru
                Write-Host "VSIX installer exit code: $($p.ExitCode)"
              }
            }
          }

      - name: Build the driver
        run: |
          msbuild "Virtual Display Driver (HDR)/ZakoVDD.sln" /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Stamp driver version
        shell: pwsh
        run: |
          # Resolve stampinf path from WDK
          $stampinf = Get-ChildItem "C:\Program Files*\Windows Kits\10\bin\*\x64\stampinf.exe" -ErrorAction SilentlyContinue |
                      Sort-Object { $_.Directory.Parent.Name } -Descending |
                      Select-Object -First 1
          if (-not $stampinf) {
            Write-Error "stampinf.exe not found"
            exit 1
          }
          Write-Host "Using stampinf: $($stampinf.FullName)"

          $infPath = "Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\ZakoVDD.inf"

          # Extract version from tag (e.g. v0.13 -> 0.13.0.0) or use date-based version
          $ref = "${{ github.ref }}"
          if ($ref -match '^refs/tags/v(.+)$') {
            $ver = $Matches[1]
            # Pad to 4 parts: 0.13 -> 0.13.0.0
            $parts = $ver.Split('.')
            while ($parts.Count -lt 4) { $parts += '0' }
            $version = ($parts[0..3] -join '.')
          } else {
            # Non-tag build: use 99.MM.DD.HHMM to ensure high version
            $now = Get-Date -Format "MM.dd.HHmm"
            $version = "99.$now"
          }

          $date = Get-Date -Format "MM/dd/yyyy"
          Write-Host "Setting DriverVer = $date, $version"

          & $stampinf.FullName -f $infPath -d $date -v $version
          Get-Content $infPath | Select-String "DriverVer"

      - name: List build directory
        continue-on-error: true
        run: dir "Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD"

      - name: Upload built driver
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: Built-Driver-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\ZakoVDD.dll
            Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\ZakoVDD.inf
            Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\zakovdd.cat
            Virtual Display Driver (HDR)\${{ matrix.platform }}\${{ matrix.configuration }}\ZakoVDD\vdd_settings.xml

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x64 Release artifact
        uses: actions/download-artifact@v4
        with:
          name: Built-Driver-Release-x64
          path: driver-x64/

      - name: Package release zip
        run: |
          cd driver-x64
          zip -j ../zakovdd.zip ZakoVDD.dll ZakoVDD.inf zakovdd.cat vdd_settings.xml
          cd ..
          ls -la zakovdd.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zakovdd.zip
          generate_release_notes: true

      - name: Notify Sunshine to update VDD version
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SUNSHINE_DISPATCH_TOKEN }}
          repository: qiin2333/foundation-sunshine
          event-type: driver-release
          client-payload: '{"component": "vdd", "version": "${{ github.ref_name }}"}'
